name: CI Pipeline

on:
  pull_request:

# Cancel in-progress runs when a new commit is pushed
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    steps:
      # Checkout repository code
      - name: Checkout code
        uses: actions/checkout@v6

      # Set up Node.js environment
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      # Install dependencies using clean install
      - name: Install dependencies
        run: npm ci

      # Run ESLint to check code style
      - name: Run ESLint
        run: npm run lint

      # Check TypeScript types without emitting files
      - name: Type check
        run: npx tsc --noEmit

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - branch: main
            artifact: main
          - branch: ${{ github.head_ref }}
            artifact: pull-request

    permissions:
      # Required to check out the code
      contents: read

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ matrix.branch }}
          ## Set repository to correctly checkout from forks
          repository: ${{ github.event.pull_request.head.repo.full_name }}

      # Set up Node.js environment
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      # Install dependencies using clean install
      - name: Install dependencies
        run: npm ci

      - name: Run Tests
        run: npm run test:ci

      - name: Upload Coverage
        uses: actions/upload-artifact@v5
        with:
          name: coverage-${{ matrix.artifact }}
          path: coverage

  report-coverage:
    needs: test
    runs-on: ubuntu-latest
    steps:
      ## Check out the repository to obtain the vitest.config file
      - uses: actions/checkout@v5
      - name: Download Coverage Artifacts
        uses: actions/download-artifact@v6
        with:
          name: coverage-pull-request
          path: coverage
      - uses: actions/download-artifact@v6
        with:
          name: coverage-main
          path: coverage-main

      - name: Report Coverage
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          json-summary-compare-path: coverage-main/coverage-summary.json

  build:
    name: Build Application
    runs-on: ubuntu-latest
    needs: [ lint, test ]  # Only build if lint and test pass
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Build the production bundle
      - name: Build
        run: npm run build

      # Upload build artifacts for deployment jobs
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: dist/
          retention-days: 7